name: Build Images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: terrorawm

jobs:
  images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build backend jars
        working-directory: backend
        run: mvn -DskipTests package

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend images
        run: |
          for service in eureka-service config-service gateway-service user-service product-service stock-service order-service; do
            image="${REGISTRY}/${IMAGE_NAMESPACE}/stockmaster-${service}"
            docker build -t "${image}:latest" -t "${image}:${GITHUB_SHA}" "backend/${service}"
            docker push "${image}:latest"
            docker push "${image}:${GITHUB_SHA}"
          done

      - name: Build and push frontend image
        run: |
          image="${REGISTRY}/${IMAGE_NAMESPACE}/stockmaster-frontend-nginx"
          docker build -t "${image}:latest" -t "${image}:${GITHUB_SHA}" frontend
          docker push "${image}:latest"
          docker push "${image}:${GITHUB_SHA}"

