name: StockMaster CI CD

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: terrorawm
  K8S_NAMESPACE: stockmaster

jobs:
  test:
    name: 1 Test and Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Run backend tests and package jars
        working-directory: backend
        run: mvn --batch-mode verify

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Validate Kubernetes manifests
        run: kubectl kustomize k8s > /tmp/stockmaster-k8s.yaml

  images:
    name: 2 Build and Push Images
    needs: test
    runs-on: self-hosted
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Package backend jars
        working-directory: backend
        run: mvn --batch-mode -DskipTests package

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend images
        run: |
          for service in eureka-service config-service gateway-service user-service product-service stock-service order-service; do
            image="${REGISTRY}/${IMAGE_NAMESPACE}/stockmaster-${service}"
            docker build -t "${image}:latest" -t "${image}:${GITHUB_SHA}" "backend/${service}"
            docker push "${image}:latest"
            docker push "${image}:${GITHUB_SHA}"
          done

      - name: Build and push frontend image
        run: |
          image="${REGISTRY}/${IMAGE_NAMESPACE}/stockmaster-frontend-nginx"
          docker build -t "${image}:latest" -t "${image}:${GITHUB_SHA}" frontend
          docker push "${image}:latest"
          docker push "${image}:${GITHUB_SHA}"

  deploy:
    name: 3 Deploy and Verify Kubernetes
    needs: images
    runs-on: self-hosted
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Verify cluster connection
        run: |
          kubectl cluster-info
          kubectl get nodes -o wide

      - name: Deploy commit images
        run: |
          for service in eureka-service config-service gateway-service user-service product-service stock-service order-service; do
            kubectl set image "deployment/${service}" "${service}=${REGISTRY}/${IMAGE_NAMESPACE}/stockmaster-${service}:${GITHUB_SHA}" -n "${K8S_NAMESPACE}"
          done
          kubectl set image deployment/frontend-nginx "frontend-nginx=${REGISTRY}/${IMAGE_NAMESPACE}/stockmaster-frontend-nginx:${GITHUB_SHA}" -n "${K8S_NAMESPACE}"

      - name: Wait for rollouts
        run: |
          kubectl rollout status statefulset/mysql -n "${K8S_NAMESPACE}" --timeout=300s
          for service in eureka-service config-service gateway-service user-service product-service stock-service order-service frontend-nginx; do
            kubectl rollout status "deployment/${service}" -n "${K8S_NAMESPACE}" --timeout=300s
          done

      - name: Show deployment result
        run: |
          kubectl get nodes -o wide
          kubectl get pods,deployments,statefulsets,services -n "${K8S_NAMESPACE}" -o wide
