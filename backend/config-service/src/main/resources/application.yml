server:
  port: 8888

spring:
  application:
    name: config-service
  cloud:
    config:
      server:
        git:
          uri: ${CONFIG_GIT_URI:file:./config-repo}
          default-label: ${CONFIG_GIT_LABEL:main}
          search-paths: ${CONFIG_GIT_SEARCH_PATHS:config-repo}
          clone-on-start: true

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

management:
  endpoint:
    health:
      probes:
        enabled: true
