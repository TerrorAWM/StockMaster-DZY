apiVersion: apps/v1
kind: Deployment
metadata:
  name: eureka-service
  namespace: stockmaster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: eureka-service
  template:
    metadata:
      labels:
        app: eureka-service
    spec:
      containers:
        - name: eureka-service
          image: ghcr.io/terrorawm/stockmaster-eureka-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8761
---
apiVersion: v1
kind: Service
metadata:
  name: eureka-service
  namespace: stockmaster
spec:
  selector:
    app: eureka-service
  ports:
    - port: 8761
      targetPort: 8761
      nodePort: 30761
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-service
  namespace: stockmaster
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-service
  template:
    metadata:
      labels:
        app: config-service
    spec:
      containers:
        - name: config-service
          image: ghcr.io/terrorawm/stockmaster-config-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          env:
            - name: CONFIG_GIT_URI
              value: https://github.com/TerrorAWM/StockMaster-DZY.git
            - name: CONFIG_GIT_SEARCH_PATHS
              value: config-repo
            - name: EUREKA_URL
              valueFrom:
                configMapKeyRef:
                  name: stockmaster-config
                  key: EUREKA_URL
---
apiVersion: v1
kind: Service
metadata:
  name: config-service
  namespace: stockmaster
spec:
  selector:
    app: config-service
  ports:
    - port: 8888
      targetPort: 8888
---
